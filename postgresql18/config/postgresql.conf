# =============================================================
# PostgreSQL 18 - Configuration
# Baseline: servidor con 1 GB de RAM — escala los valores de
# memoria según los recursos reales de tu servidor/VM/nube.
# =============================================================


# ── Conexiones & Autenticación ────────────────────────────────
listen_addresses              = '*'         # escuchar en todas las interfaces
port                          = 5432
max_connections               = 100
superuser_reserved_connections = 3
password_encryption           = scram-sha-256


# ── Memoria (escala según RAM disponible) ────────────────────
shared_buffers                = 256MB       # ~25 % de la RAM total
huge_pages                    = try
work_mem                      = 4MB         # por operación de sort/hash
maintenance_work_mem          = 64MB
effective_cache_size          = 768MB       # ~75 % de la RAM (pista al planner)
temp_file_limit               = 2GB


# ── WAL & Durabilidad ────────────────────────────────────────
wal_level                     = replica
wal_buffers                   = 16MB
wal_compression               = zstd
checkpoint_completion_target  = 0.9
max_wal_size                  = 1GB
min_wal_size                  = 80MB
synchronous_commit            = on          # off = mayor rendimiento, menor durabilidad


# ── Replicación (activar si se necesita réplica) ─────────────
max_wal_senders               = 3
wal_keep_size                 = 0


# ── Query Planner ─────────────────────────────────────────────
effective_io_concurrency      = 200         # 1 para HDD, 200+ para SSD/NVMe
random_page_cost              = 1.1         # 1.1 SSD / 4.0 HDD
default_statistics_target     = 100


# ── Paralelismo ───────────────────────────────────────────────
max_worker_processes          = 4
max_parallel_workers          = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2


# ── Logging ───────────────────────────────────────────────────
logging_collector             = on
log_directory                 = '/var/log/postgresql'
log_filename                  = 'postgresql-%Y-%m-%d.log'
log_file_mode                 = 0640
log_rotation_age              = 1d
log_rotation_size             = 100MB
log_min_duration_statement    = 1000        # registrar queries > 1 s (en ms)
log_connections               = on
log_disconnections            = on
log_duration                  = off
log_lock_waits                = on
log_temp_files                = 0
log_autovacuum_min_duration   = 250ms
log_checkpoints               = on
log_line_prefix               = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
log_timezone                  = 'UTC'


# ── Autovacuum ────────────────────────────────────────────────
autovacuum                    = on
autovacuum_max_workers        = 3
autovacuum_naptime            = 1min
autovacuum_vacuum_scale_factor   = 0.05
autovacuum_analyze_scale_factor  = 0.02
autovacuum_vacuum_cost_delay  = 2ms


# ── SSL (activar en producción con certificados reales) ───────
# ssl                         = on
# ssl_cert_file               = '/etc/ssl/certs/server.crt'
# ssl_key_file                = '/etc/ssl/private/server.key'
# ssl_min_protocol_version    = 'TLSv1.2'


# ── Zona horaria & Locale ─────────────────────────────────────
datestyle                     = 'iso, mdy'
timezone                      = 'UTC'
lc_messages                   = 'en_US.UTF-8'
lc_monetary                   = 'en_US.UTF-8'
lc_numeric                    = 'en_US.UTF-8'
lc_time                       = 'en_US.UTF-8'
default_text_search_config    = 'pg_catalog.english'
