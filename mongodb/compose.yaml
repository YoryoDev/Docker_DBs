services:

  mongodb_init:
    image: busybox:latest
    user: "0"
    profiles:
      - mongodb
    command:
      - sh
      - -c
      - |
        mkdir -p /mnt/data /mnt/backup /mnt/log
        chown -R 999:999 /mnt/data /mnt/backup /mnt/log
    volumes:
      - ./data:/mnt/data
      - ./backup:/mnt/backup
      - ./log:/mnt/log

  mongodb:
    image: mongo:8.0.20
    container_name: mongodb8
    hostname: mongodb8
    restart: no
    depends_on:
      mongodb_init:
        condition: service_completed_successfully
    profiles:
      - mongodb
    ports:
      - "${BIND_ADDRESS}:27017:27017"
    volumes:
      - ./data:/data/db
      - ./backup:/data/backup
      - ./log:/var/log/mongodb
      - ./config/mongod.conf:/etc/mongod.conf:ro
    command: mongod --config /etc/mongod.conf
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

