# =============================================================
# MongoDB 8.0 — mongod.conf
# Referencia: https://www.mongodb.com/docs/manual/reference/configuration-options/
# Baseline: 1 GB de RAM — escala los valores según los recursos
# reales de tu servidor/VM/nube.
# =============================================================

# ── Almacenamiento ────────────────────────────────────────────
storage:
  dbPath: /data/db
  directoryPerDB: true
  wiredTiger:
    engineConfig:
      # ~50 % de la RAM libre después del SO (~25 % de RAM total)
      cacheSizeGB: 0.25
      journalCompressor: snappy
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true


# ── Diario (durabilidad) ──────────────────────────────────────
# journal es siempre activo en WiredTiger para standalone/replica
# (no tiene opción de desactivarse en versiones modernas)


# ── Logging ───────────────────────────────────────────────────
systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  logRotate: reopen
  verbosity: 0                # 0=normal, 1-5=debug progresivo
  component:
    query:
      verbosity: 0
    write:
      verbosity: 0


# ── Red ───────────────────────────────────────────────────────
net:
  port: 27017
  # Escuchar en todas las interfaces del contenedor.
  # El control de acceso externo lo gestiona el mapeo de puertos (BIND_ADDRESS) en el compose.
  bindIp: 0.0.0.0
  maxIncomingConnections: 200
  tls:
    mode: disabled            # En producción: allowTLS / requireTLS
    # certificateKeyFile: /etc/ssl/mongodb/server.pem
    # CAFile:             /etc/ssl/mongodb/ca.pem
    # disabledProtocols:  TLS1_0,TLS1_1


# ── Seguridad ─────────────────────────────────────────────────
security:
  authorization: enabled      # Requiere autenticación con usuario/contraseña


# ── Replicación (activar si vas a usar Replica Set) ───────────
# replication:
#   replSetName: "rs0"
#   oplogSizeMB: 512


# ── Operaciones lentas ────────────────────────────────────────
operationProfiling:
  mode: slowOp               # off | slowOp | all
  slowOpThresholdMs: 100     # registrar operaciones > 100 ms
  slowOpSampleRate: 1.0
