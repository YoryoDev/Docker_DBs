services:

  mssql_es_init:
    image: busybox:latest
    user: "0"
    profiles:
      - mssql-es
    command:
      - sh
      - -c
      - |
        chown -R 10001:0 \
          /var/opt/mssql/data \
          /var/opt/mssql/backup \
          /var/opt/mssql/jobs \
          /var/opt/mssql/log
    volumes:
      - sqlserver25_es_data:/var/opt/mssql/data
      - sqlserver25_es_backup:/var/opt/mssql/backup
      - sqlserver25_es_jobs:/var/opt/mssql/jobs
      - sqlserver25_es_log:/var/opt/mssql/log

  mssql_es:
    image: mcr.microsoft.com/mssql/server:2025-CU3-ubuntu-22.04
    container_name: sqlserver25_es
    hostname: sqlserver25_es
    restart: no
    depends_on:
      mssql_es_init:
        condition: service_completed_successfully
    profiles:
      - mssql-es
    ports:
      - "${BIND_ADDRESS}:1434:1433"
    volumes:
      - sqlserver25_es_data:/var/opt/mssql/data
      - sqlserver25_es_backup:/var/opt/mssql/backup
      - sqlserver25_es_jobs:/var/opt/mssql/jobs
      - sqlserver25_es_log:/var/opt/mssql/log
      - ./config/mssql.conf:/var/opt/mssql/mssql.conf:ro
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "StandardDeveloper"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_AGENT_ENABLED: "true"
      MSSQL_COLLATION: "Modern_Spanish_CI_AS"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1' -No -l 5"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"

volumes:
  sqlserver25_es_data:
  sqlserver25_es_backup:
  sqlserver25_es_jobs:
  sqlserver25_es_log:
