services:

  mssql2025_init:
    image: busybox:latest
    user: "0"
    profiles:
      - mssql2025
    command:
      - sh
      - -c
      - |
        mkdir -p /mnt/data /mnt/backup /mnt/jobs /mnt/log
        chown -R 10001:0 /mnt/data /mnt/backup /mnt/jobs /mnt/log
    volumes:
      - ./data:/mnt/data
      - ./backup:/mnt/backup
      - ./jobs:/mnt/jobs
      - ./log:/mnt/log

  mssql2025:
    image: mcr.microsoft.com/mssql/server:2025-CU3-ubuntu-22.04
    container_name: sqlserver25
    hostname: sqlserver25
    restart: no
    depends_on:
      mssql2025_init:
        condition: service_completed_successfully
    profiles:
      - mssql2025
    ports:
      - "${BIND_ADDRESS}:1433:1433"
    volumes:
      - ./data:/var/opt/mssql/data
      - ./backup:/var/opt/mssql/backup
      - ./jobs:/var/opt/mssql/jobs
      - ./log:/var/opt/mssql/log
      - ./config/mssql.conf:/var/opt/mssql/mssql.conf:ro
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "StandardDeveloper"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_AGENT_ENABLED: "true"
      MSSQL_COLLATION: "Latin1_General_100_CI_AS_SC"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1' -No -l 5"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1.2G
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.5"
