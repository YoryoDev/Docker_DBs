# =============================================================
# SQL Server 2022 — mssql.conf
# Referencia: https://learn.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf
# =============================================================

[network]
# Puerto TCP (default 1433)
tcpport = 1433

# Versiones TLS permitidas (mínimo TLS 1.2 recomendado)
tlsprotocols = 1.2,1.3

# Forzar cifrado en todas las conexiones (0=no forzar, 1=forzar)
# En producción con certificado real: forceencryption = 1
forceencryption = 0

# Ruta al certificado TLS (descomenta en producción)
# tlscert   = /etc/ssl/certs/mssql.pem
# tlskey    = /etc/ssl/private/mssql.key


[memory]
# Límite de memoria para el motor SQL en MB
# VM 3.8 GB compartida con múltiples motores — se asigna ~900 MB a cada SQL Server
memorylimitmb = 900


[sqlagent]
# Habilitar SQL Server Agent (también controlado por MSSQL_AGENT_ENABLED)
enabled = true


[errorlog]
# Número de archivos de error log a conservar (rotación)
numfiles = 8


[filelocation]
# Directorios de almacenamiento de archivos
defaultdatadir  = /var/opt/mssql/data
defaultlogdir   = /var/opt/mssql/log
defaultbackupdir = /var/opt/mssql/backup
errorlogfile    = /var/opt/mssql/log/errorlog
masterdbdir     = /var/opt/mssql/data
masterdblogdir  = /var/opt/mssql/log


[telemetry]
# Desactivar el envío de datos de uso a Microsoft
customerfeedback = false
