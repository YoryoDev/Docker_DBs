services:

  mysql_init:
    image: busybox:latest
    user: "0"
    profiles:
      - mysql
    command:
      - sh
      - -c
      - |
        mkdir -p /mnt/data /mnt/backup /mnt/log
        chown -R 999:999 /mnt/data /mnt/backup /mnt/log
    volumes:
      - ./data:/mnt/data
      - ./backup:/mnt/backup
      - ./log:/mnt/log

  mysql:
    image: mysql:8.4.8
    container_name: mysql8
    hostname: mysql8
    restart: no
    depends_on:
      mysql_init:
        condition: service_completed_successfully
    profiles:
      - mysql
    ports:
      - "${BIND_ADDRESS}:3306:3306"
    volumes:
      - ./data:/var/lib/mysql
      - ./backup:/var/lib/mysql-backup
      - ./log:/var/log/mysql
      - ./config/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.25"

