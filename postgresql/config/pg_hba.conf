# =============================================================
# pg_hba.conf — Autenticación basada en host (PostgreSQL 18)
#
# Formato:
#   TYPE  DATABASE  USER  ADDRESS         METHOD
# =============================================================

# ── Socket UNIX local (dentro del contenedor) ─────────────────
local   all         all                   peer

# ── Loopback IPv4 e IPv6 ─────────────────────────────────────
host    all         all   127.0.0.1/32    scram-sha-256
host    all         all   ::1/128         scram-sha-256

# ── Red Docker / acceso remoto ────────────────────────────────
# En producción reemplaza 0.0.0.0/0 por el rango de tu red,
# por ejemplo: 192.168.1.0/24 o la subred de Docker 172.16.0.0/12
host    all         all   0.0.0.0/0       scram-sha-256

# ── Replicación ───────────────────────────────────────────────
# Restringe la IP a la del servidor réplica en producción
host    replication all   127.0.0.1/32    scram-sha-256
